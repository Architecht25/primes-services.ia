# Configuration IA Chatbot pour primes-services.ia
# =================================================

development:
  anthropic:
    api_key: <%= ENV.fetch("ANTHROPIC_API_KEY") { "your_anthropic_api_key_here" } %>
    model: <%= ENV.fetch("ANTHROPIC_MODEL") { "claude-sonnet-4-6" } %>
    max_tokens: <%= ENV.fetch("ANTHROPIC_MAX_TOKENS") { 2000 } %>
    temperature: <%= ENV.fetch("ANTHROPIC_TEMPERATURE") { 0.3 } %>

  assistant:
    name: <%= ENV.fetch("AI_ASSISTANT_NAME") { "Assistant Primes Services" } %>
    language: <%= ENV.fetch("AI_LANGUAGE") { "fr-BE" } %>
    fallback_language: <%= ENV.fetch("AI_FALLBACK_LANGUAGE") { "fr" } %>

  regions:
    default: <%= ENV.fetch("DEFAULT_REGION") { "wallonie" } %>
    supported: <%= ENV.fetch("SUPPORTED_REGIONS") { "wallonie,flandre,bruxelles" }.split(",") %>

  integrations:
    renovate_base_url: <%= ENV.fetch("RENOVATE_BASE_URL") { "https://www.ren0vate.be/" } %>
    team_email: <%= ENV.fetch("TEAM_EMAIL") { "equipe@primes-services.be" } %>

  debug:
    enabled: <%= ENV.fetch("AI_DEBUG_MODE") { true } %>
    log_conversations: <%= ENV.fetch("AI_LOG_CONVERSATIONS") { true } %>

  cache:
    enabled: <%= ENV.fetch("AI_CACHE_ENABLED") { true } %>
    duration: <%= ENV.fetch("AI_CACHE_DURATION") { 3600 } %>

test:
  anthropic:
    api_key: "test_api_key"
    model: "claude-haiku-4-5-20251001"
    max_tokens: 1000
    temperature: 0.1

  assistant:
    name: "Assistant Test"
    language: "fr-BE"
    fallback_language: "fr"

  regions:
    default: "belgique"
    supported: ["wallonie", "flandre", "bruxelles"]

  debug:
    enabled: true
    log_conversations: false

  cache:
    enabled: false
    duration: 300

production:
  anthropic:
    api_key: <%= ENV.fetch("ANTHROPIC_API_KEY") { nil } %>
    model: <%= ENV.fetch("ANTHROPIC_MODEL") { "claude-sonnet-4-6" } %>
    max_tokens: <%= ENV.fetch("ANTHROPIC_MAX_TOKENS") { 2000 } %>
    temperature: <%= ENV.fetch("ANTHROPIC_TEMPERATURE") { 0.3 } %>

  assistant:
    name: <%= ENV.fetch("AI_ASSISTANT_NAME") { "Assistant Primes Services" } %>
    language: <%= ENV.fetch("AI_LANGUAGE") { "fr-BE" } %>
    fallback_language: <%= ENV.fetch("AI_FALLBACK_LANGUAGE") { "fr" } %>

  regions:
    default: <%= ENV.fetch("DEFAULT_REGION") { "belgique" } %>
    supported: <%= ENV.fetch("SUPPORTED_REGIONS") { "wallonie,flandre,bruxelles" }.split(",") %>

  integrations:
    renovate_base_url: <%= ENV.fetch("RENOVATE_BASE_URL") { "https://www.ren0vate.be/" } %>
    team_email: <%= ENV.fetch("TEAM_EMAIL") { "robin@primes-services.be" } %>

  debug:
    enabled: false
    log_conversations: <%= ENV.fetch("AI_LOG_CONVERSATIONS") { false } %>

  cache:
    enabled: <%= ENV.fetch("AI_CACHE_ENABLED") { true } %>
    duration: <%= ENV.fetch("AI_CACHE_DURATION") { 3600 } %>
